# Modely — Fly.io (https://fly.io/docs/reference/configuration/)
app = 'modely-vimio'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'
  HOSTNAME = '0.0.0.0'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[mounts]]
  source = 'modely_data'
  destination = '/app/data'
  initial_size = '5gb'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
